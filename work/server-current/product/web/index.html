<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Can Rent Lah｜新加坡租房 AI</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<!-- Login screen -->
<main id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="brand">Can Rent Lah</div>
    <h1>新加坡租房 AI 助手</h1>
    <p>直接告诉我想找什么样的房子，我帮你搜、帮你筛。</p>
    <div id="loginError" class="login-error hidden"></div>
    <form id="loginForm" class="stack-form">
      <label>邮箱 <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="email"></label>
      <label>密码 <input id="passwordInput" type="password" placeholder="输入密码"></label>
      <button type="submit">登录 / 注册</button>
    </form>
    <p class="fine-print">没有账号？输入邮箱和密码直接登录即注册。</p>
  </div>
</main>

<!-- Main screen -->
<main id="mainScreen" class="main-screen hidden">
  <header class="topbar">
    <div class="brand">Can Rent Lah</div>
    <div class="topbar-right">
      <span id="accountBadge" class="account-badge"></span>
      <button id="settingsBtn" class="secondary small">设置</button>
      <button id="logoutBtn" class="secondary small">退出</button>
    </div>
  </header>

  <div class="main-layout">
    <!-- Chat panel -->
    <section class="chat-panel">
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <textarea id="chatInput" rows="2" placeholder="说你的需求，例如：NUS附近 1500新币以内 单间，最好有空调"></textarea>
        <button type="submit">发送</button>
      </form>
    </section>

    <!-- Saved listings sidebar -->
    <aside class="listings-sidebar">
      <h2>收藏记录</h2>
      <div id="listingGrid" class="listing-grid">
        <div class="subtle" style="padding:20px;text-align:center">还没有收藏房源。<br>Agent 推荐后可以收藏到这里。</div>
      </div>
    </aside>
  </div>
</main>

<!-- Settings modal -->
<div id="settingsModal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-head">
      <h2>账号设置</h2>
      <button id="closeSettingsBtn" class="secondary small">✕</button>
    </div>

    <div class="modal-body">
      <section class="settings-section">
        <h3>账户信息</h3>
        <div id="settingsInfo" class="settings-info"></div>
      </section>

      <section class="settings-section">
        <h3>修改密码</h3>
        <form id="passwordForm" class="stack-form">
          <label>原密码 <input id="oldPasswordInput" type="password" placeholder="输入原密码"></label>
          <label>新密码 <input id="newPasswordInput" type="password" placeholder="至少6位"></label>
          <p id="passwordMsg" class="settings-msg hidden"></p>
          <button type="submit">更新密码</button>
        </form>
      </section>

      <section class="settings-section">
        <h3>租房偏好</h3>
        <p class="settings-desc">Agent 会参考这些信息帮你搜索，不用每次都重复说。</p>
        <form id="profileForm" class="stack-form">
          <label>学校
            <select id="profileSchool">
              <option value="">未选择</option>
              <option value="NUS">NUS</option>
              <option value="NTU">NTU</option>
              <option value="SMU">SMU</option>
              <option value="SUTD">SUTD</option>
              <option value="SIM">SIM</option>
              <option value="Kaplan">Kaplan</option>
              <option value="NAFA">NAFA</option>
            </select>
          </label>
          <label>月预算 (SGD) <input id="profileBudget" type="number" placeholder="如 1800"></label>
          <label>房型偏好
            <select id="profileType">
              <option value="">不限</option>
              <option value="hdb-room">HDB 单间</option>
              <option value="hdb">HDB 整租</option>
              <option value="condo">Condo</option>
              <option value="apartment">Apartment</option>
            </select>
          </label>
          <label>首选区域 <input id="profileAreas" type="text" placeholder="如 Clementi, Dover（逗号分隔）"></label>
          <label>不能接受的 <input id="profileDealbreakers" type="text" placeholder="如 没空调、一楼、西晒"></label>
          <p id="profileMsg" class="settings-msg hidden"></p>
          <button type="submit">保存偏好</button>
        </form>
      </section>
    </div>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
