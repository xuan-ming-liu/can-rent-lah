<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>合同审查 · Can Rent Lah</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .contract-layout {
      min-height: 100vh; display: grid; grid-template-rows: auto 1fr;
    }
    .contract-top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 24px; border-bottom: 1px solid var(--line); background: var(--surface);
    }
    .contract-body {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden;
    }
    .contract-input-panel {
      padding: 24px; display: grid; grid-template-rows: 1fr auto; gap: 14px;
    }
    .contract-input-panel textarea {
      flex: 1; min-height: 300px; font-size: 13px; font-family: monospace;
      line-height: 1.6; resize: none;
    }
    .contract-output-panel {
      padding: 24px; overflow: auto; border-left: 1px solid var(--line);
      background: #fdfdfd; font-size: 14px; line-height: 1.7;
    }
    .contract-output-panel h3 { margin-top: 18px; }
    .contract-output-panel h3:first-child { margin-top: 0; }
    .contract-output-panel .critical { color: #721c24; background: #f8d7da; padding: 2px 6px; border-radius: 4px; }
    .contract-output-panel .warning { color: #856404; background: #fff3cd; padding: 2px 6px; border-radius: 4px; }
    .contract-output-panel .pass { color: #155724; background: #d4edda; padding: 2px 6px; border-radius: 4px; }

    @media (max-width: 860px) {
      .contract-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      .contract-output-panel { border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body class="contract-layout">
  <header class="contract-top">
    <div>
      <span class="brand" style="font-size:18px;font-weight:900;color:var(--accent)">Can Rent Lah</span>
      <span style="color:var(--muted);margin-left:12px;font-size:14px">合同审查</span>
    </div>
    <div style="display:flex;gap:8px">
      <a href="/" class="secondary small" style="text-decoration:none;display:inline-flex;align-items:center;padding:5px 10px;border:1px solid var(--line);border-radius:6px;color:var(--ink);font-size:12px">← 返回</a>
      <button id="reviewBtn">开始审查</button>
    </div>
  </header>

  <div class="contract-body">
    <div class="contract-input-panel">
      <textarea id="contractInput" placeholder="在这里粘贴你的 TA（Tenancy Agreement）或 LOI（Letter of Intent）全文...&#10;&#10;Agent 会逐条审查：&#10;🔴 必须修改的条款&#10;🟡 建议协商的条款&#10;🟢 符合标准的条款&#10;&#10;特别检查：外交条款、押金条款、维修责任、HDB/Condo 专项"></textarea>
      <p id="contractMsg" style="font-size:12px;color:var(--muted);margin:0">
        💡 也可以直接在聊天框里发「审合同」+ 粘贴文本
      </p>
    </div>

    <div id="contractOutput" class="contract-output-panel">
      <p class="subtle">输入合同内容后点击「开始审查」，Agent 会逐条分析。</p>
    </div>
  </div>

  <script type="module">
    const token = localStorage.getItem('canRentLahToken');
    if (!token) { location.href = '/'; }

    const API_BASE = window.location.origin;
    async function api(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: token ? `Bearer ${token}` : '',
          ...(options.headers || {}),
        },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || '请求失败');
      return data;
    }

    const input = document.querySelector('#contractInput');
    const output = document.querySelector('#contractOutput');
    const msg = document.querySelector('#contractMsg');
    const btn = document.querySelector('#reviewBtn');

    btn.addEventListener('click', async () => {
      const text = input.value.trim();
      if (!text) { msg.textContent = '请粘贴合同内容'; msg.style.color = '#e74c3c'; return; }
      btn.disabled = true;
      btn.textContent = '审查中...';
      output.innerHTML = '<p class="subtle">Agent 正在逐条分析合同，请稍候...</p>';
      msg.textContent = '';
      try {
        const data = await api('/api/contract/review', { method: 'POST', body: JSON.stringify({ contractText: text }) });
        output.innerHTML = renderReport(data.report);
      } catch (err) {
        output.innerHTML = `<p style="color:#e74c3c">审查失败：${err.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '开始审查';
      }
    });

    function renderReport(md) {
      const lines = String(md || '').split(/\r?\n/);
      const html = []; let inList = false;
      function close() { if (inList) { html.push('</ul>'); inList = false; } }
      for (let line of lines) {
        line = line.trimEnd();
        if (!line.trim()) { close(); continue; }
        const h = line.match(/^(#{1,3})\s+(.+)$/);
        if (h) { close(); html.push(`<h${h[1].length + 2}>${esc(h[2])}</h${h[1].length + 2}>`); continue; }
        const b = line.match(/^[-*]\s+(.+)$/) || line.match(/^\d+[.)]\s+(.+)$/);
        if (b) { if (!inList) { html.push('<ul>'); inList = true; } html.push(`<li>${colorTags(esc(b[1]))}</li>`); continue; }
        close(); html.push(`<p>${colorTags(esc(line))}</p>`);
      }
      close();
      return html.join('');
    }

    function colorTags(text) {
      return text
        .replace(/🔴/g, '<span class="critical">🔴</span>')
        .replace(/🟡/g, '<span class="warning">🟡</span>')
        .replace(/🟢/g, '<span class="pass">🟢</span>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    }

    function esc(v) { return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }
  </script>
</body>
</html>
