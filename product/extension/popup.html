<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <style>
      :root {
        --brand-50: hsl(168, 55%, 95%);
        --brand-100: hsl(170, 52%, 88%);
        --brand-500: hsl(173, 55%, 34%);
        --brand-600: hsl(174, 58%, 26%);
        --brand-700: hsl(175, 60%, 18%);
        --neutral-50: hsl(165, 6%, 96%);
        --neutral-100: hsl(166, 5%, 90%);
        --neutral-200: hsl(167, 5%, 82%);
        --neutral-400: hsl(169, 4%, 52%);
        --neutral-600: hsl(172, 6%, 30%);
        --neutral-800: hsl(174, 8%, 14%);
        --danger-50: hsl(8, 50%, 94%);
        --danger-500: hsl(6, 50%, 42%);
        --radius-lg: 12px;
        --radius-full: 9999px;
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-width: 300px;
        padding: 20px;
        color: var(--neutral-800);
        background:
          radial-gradient(ellipse 60% 50% at 50% -5%, hsl(170 50% 94% / 0.6), transparent),
          hsl(0, 0%, 100%);
        font-family: "DM Sans", "Plus Jakarta Sans", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, hsl(173, 55%, 34%), hsl(175, 60%, 18%));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 12px;
      }

      .brand-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
        color: white;
        font-size: 14px;
        -webkit-text-fill-color: white;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-radius: var(--radius-lg);
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 16px;
      }

      .status-badge.connected {
        background: hsl(150, 45%, 93%);
        color: hsl(155, 48%, 28%);
        border: 1px solid hsl(150, 35%, 80%);
      }

      .status-badge.disconnected {
        background: var(--danger-50);
        color: var(--danger-500);
        border: 1px solid hsl(6, 35%, 84%);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: var(--radius-full);
        flex-shrink: 0;
      }

      .dot.online {
        background: hsl(155, 48%, 38%);
        box-shadow: 0 0 0 3px hsl(150, 45%, 85%);
        animation: pulse-dot 2s ease infinite;
      }

      .dot.offline {
        background: var(--danger-500);
      }

      @keyframes pulse-dot {
        0%, 100% { box-shadow: 0 0 0 2px hsl(150, 45%, 85%); }
        50% { box-shadow: 0 0 0 6px hsl(150, 45%, 78%); }
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        background: var(--brand-600);
        color: white;
        padding: 12px 16px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 650;
        font-size: 14px;
        transition:
          background 0.15s var(--ease-out),
          transform 0.15s var(--ease-out),
          box-shadow 0.15s var(--ease-out);
      }

      button:hover {
        background: var(--brand-700);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px hsl(174 30% 40% / 0.15);
      }

      button:active {
        transform: translateY(0) scale(0.98);
        transition: transform 60ms var(--ease-out);
      }

      button:disabled {
        background: var(--neutral-200);
        color: var(--neutral-400);
        cursor: not-allowed;
        box-shadow: none;
      }

      .quick-links {
        display: grid;
        gap: 6px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--neutral-100);
      }

      .quick-links a {
        display: block;
        padding: 8px 12px;
        border-radius: 8px;
        color: var(--neutral-600);
        font-size: 13px;
        text-decoration: none;
        line-height: 1.5;
        transition: all 0.15s var(--ease-out);
      }

      .quick-links a:hover {
        background: var(--neutral-50);
        color: var(--brand-600);
      }

      .version {
        text-align: center;
        margin-top: 12px;
        font-size: 11px;
        color: var(--neutral-400);
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <span class="brand-icon">🏠</span>
      Can Rent Lah
    </div>
    <div id="statusArea">
      <div class="status-badge disconnected">
        <span class="dot offline"></span>
        <span id="statusText">正在检查连接状态...</span>
      </div>
    </div>
    <button id="loginBtn">打开工作台</button>
    <div class="quick-links">
      <a href="https://www.propertyguru.com.sg/property-for-rent" target="_blank" rel="noreferrer">
        🔍 打开 PropertyGuru 找房
      </a>
    </div>
    <div class="version">v0.2.0</div>
    <script src="lib/gsap.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
